name: Supabase Keep-Alive

on:
  schedule:
    # Tous les lundis à 08h00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch: # Permet de lancer manuellement depuis GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 500 ]; then
            echo "Ping échoué (status $STATUS)"
            exit 1
          fi
          echo "Supabase est actif !"
